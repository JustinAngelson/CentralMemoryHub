<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — Central Memory Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .auth-card {
            max-width: 480px;
            margin: 6vh auto 0;
            background: #FFFFFF;
            border: 1px solid #ECEDED;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(31,22,19,0.10);
        }
    </style>
</head>
<body style="background-color:#EFE9E0;">
    <div class="container">
        <div class="auth-card p-4 p-md-5">
            <div class="text-center mb-4">
                <h4 class="fw-bold" style="color:#1F1613;">Create Your Account</h4>
                <p class="small" style="color:#6b6360;">You've been invited to join the Central Memory Hub.</p>
            </div>

            {% if error %}
            <div class="alert alert-danger py-2 small">{{ error }}</div>
            {% elif inv %}
                {% if errors %}
                  {% for e in errors %}
                  <div class="alert alert-danger py-2 small">{{ e }}</div>
                  {% endfor %}
                {% endif %}

                {% if inv.email_hint %}
                <div class="alert alert-info py-2 small mb-3">
                    Invited for: <strong>{{ inv.email_hint }}</strong>
                </div>
                {% endif %}

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Username</label>
                        <input type="text" name="username" class="form-control" required autofocus
                               value="{{ username or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Email</label>
                        <input type="email" name="email" class="form-control" required
                               value="{{ email or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Password <span class="text-muted">(min 8 chars)</span></label>
                        <input type="password" name="password" class="form-control" required minlength="8">
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-semibold">Confirm Password</label>
                        <input type="password" name="confirm_password" class="form-control" required minlength="8">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Create Account</button>
                </form>
            {% endif %}
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
