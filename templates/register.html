<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — Central Memory Hub</title>
    <link rel="stylesheet" href="https://cdn.replit.com/agent/bootstrap-agent-dark-theme.min.css">
    <style>
        body { background-color: #0d1117; }
        .register-card {
            max-width: 480px;
            margin: 6vh auto 0;
            border: 1px solid #30363d;
            border-radius: 12px;
            background: #161b22;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="register-card p-4 p-md-5 shadow">
            <div class="text-center mb-4">
                <h4 class="fw-bold">Create Your Account</h4>
                <p class="text-muted small">You've been invited to join the Central Memory Hub.</p>
            </div>

            {% if error %}
            <div class="alert alert-danger py-2 small">{{ error }}</div>
            {% elif inv %}
                {% if errors %}
                  {% for e in errors %}
                  <div class="alert alert-danger py-2 small">{{ e }}</div>
                  {% endfor %}
                {% endif %}

                {% if inv.email_hint %}
                <div class="alert alert-info py-2 small mb-3">
                    Invited for: <strong>{{ inv.email_hint }}</strong>
                </div>
                {% endif %}

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Username</label>
                        <input type="text" name="username" class="form-control" required autofocus
                               value="{{ username or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Email</label>
                        <input type="email" name="email" class="form-control" required
                               value="{{ email or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Password <span class="text-muted">(min 8 chars)</span></label>
                        <input type="password" name="password" class="form-control" required minlength="8">
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-semibold">Confirm Password</label>
                        <input type="password" name="confirm_password" class="form-control" required minlength="8">
                    </div>
                    <button type="submit" class="btn btn-success w-100">Create Account</button>
                </form>
            {% endif %}
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
