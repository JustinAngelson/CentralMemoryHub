<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First-Run Setup — Central Memory Hub</title>
    <link rel="stylesheet" href="https://cdn.replit.com/agent/bootstrap-agent-dark-theme.min.css">
    <style>
        body { background-color: #0d1117; }
        .setup-card {
            max-width: 460px;
            margin: 6vh auto 0;
            border: 1px solid #30363d;
            border-radius: 12px;
            background: #161b22;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="setup-card p-4 p-md-5 shadow">
            <div class="text-center mb-4">
                <h4 class="fw-bold">Create Admin Account</h4>
                <p class="text-muted small">This page is only available before the first admin is created.</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% for category, message in messages %}
                <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
              {% endfor %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.setup') }}">
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Username</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Password <span class="text-muted">(min 8 chars)</span></label>
                    <input type="password" name="password" class="form-control" required minlength="8">
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-semibold">Confirm Password</label>
                    <input type="password" name="confirm_password" class="form-control" required minlength="8">
                </div>
                <button type="submit" class="btn btn-success w-100">Create Admin &amp; Continue</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
