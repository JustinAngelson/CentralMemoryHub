<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Central Memory Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .auth-card {
            max-width: 420px;
            margin: 8vh auto 0;
            background: #FFFFFF;
            border: 1px solid #ECEDED;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(31,22,19,0.10);
        }
        .brand-dot {
            display: inline-flex;
            width: 44px;
            height: 44px;
            background: #008F8C;
            border-radius: 50%;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.25rem;
            margin-bottom: .5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-card p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="brand-dot">&#9632;</div>
                <h4 class="fw-bold">Central Memory Hub</h4>
                <p class="small text-muted">Sign in to your account</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% for category, message in messages %}
                <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
              {% endfor %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Username</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" name="remember" id="remember">
                    <label class="form-check-label small" for="remember">Remember me</label>
                </div>
                <button type="submit" class="btn btn-primary w-100">Sign In</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
