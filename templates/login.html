<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Central Memory Hub</title>
    <link rel="stylesheet" href="https://cdn.replit.com/agent/bootstrap-agent-dark-theme.min.css">
    <style>
        body { background-color: #0d1117; }
        .login-card {
            max-width: 420px;
            margin: 8vh auto 0;
            border: 1px solid #30363d;
            border-radius: 12px;
            background: #161b22;
        }
        .brand-icon { font-size: 2rem; color: #58a6ff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card p-4 p-md-5 shadow">
            <div class="text-center mb-4">
                <div class="brand-icon mb-2">&#9679;</div>
                <h4 class="fw-bold">Central Memory Hub</h4>
                <p class="text-muted small">Sign in to your account</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% for category, message in messages %}
                <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
              {% endfor %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Username</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" name="remember" id="remember">
                    <label class="form-check-label small" for="remember">Remember me</label>
                </div>
                <button type="submit" class="btn btn-primary w-100">Sign In</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
